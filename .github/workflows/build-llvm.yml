name: Build LLVM (reusable)
on:
  workflow_call:
    inputs:
      platform:
        description: "bionic | linux | bsd | windows"
        required: true
        type: string
      targets:
        description: "JSON array of target triples"
        required: true
        type: string
      patchset:
        description: "extra patch dir under patches/ (e.g. musl)"
        required: false
        type: string
        default: ""
      version:
        required: true
        type: string
      revision:
        required: false
        type: string
        default: ""
      projects:
        required: true
        type: string

permissions:
  contents: write
  packages: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(inputs.targets) }}
    runs-on: ubuntu-24.04
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 5120
          swap-size-mb: 5120
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true
          build-mount-path: /mnt

      - name: Move Docker to /mnt
        run: |
          sudo systemctl stop docker.socket docker.service
          sudo mkdir -p /mnt/docker
          sudo rsync -aqP /var/lib/docker/ /mnt/docker/
          sudo rm -rf /var/lib/docker
          sudo ln -s /mnt/docker /var/lib/docker
          sudo systemctl start docker

      - uses: actions/checkout@v5

      - name: Prepare build directory on /mnt
        run: |
          sudo mkdir -p /mnt/build
          sudo chown $(id -u):$(id -g) /mnt/build
          cp -a . /mnt/build/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build LLVM
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/llvm-builder:latest"
          docker run --rm \
            -v "/mnt/build:/work" -w /work --user "$(id -u):$(id -g)" \
            -e HOME=/work \
            -e PLATFORM='${{ inputs.platform }}' \
            -e TARGET='${{ matrix.target }}' \
            -e PATCHSET='${{ inputs.patchset }}' \
            -e NDK_VERSION='${{ inputs.version }}' \
            -e NDK_REVISION='${{ inputs.revision }}' \
            -e PROJECTS='${{ inputs.projects }}' \
            -e ROOTDIR=/work \
            -e CLANG_REPOSITORY_STRING='https://github.com/${{ github.repository }}' \
            -e PACKAGE_BUGREPORT='https://github.com/${{ github.repository_owner }}/android-ndk-custom/issues/' \
            "$IMAGE" \
            bash -c 'scripts/fetch-source.sh && scripts/build.sh'

      - name: Package
        run: |
          cd /mnt/build
          projects=$(echo '${{ inputs.projects }}' | tr ";" "+")
          tarball="${projects}-r${{ inputs.version }}${{ inputs.revision }}-${{ matrix.target }}"
          mv "llvm-${{ matrix.target }}" "$tarball"
          tar -c "$tarball" | xz -T0 -v > "$tarball.tar.xz"
          cp "$tarball.tar.xz" "$GITHUB_WORKSPACE/"
          echo "tarball=$tarball" >> "$GITHUB_ENV"

      - name: Upload release
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: "llvm-r${{ inputs.version }}"
          artifacts: ${{ env.tarball }}.tar.xz
          allowUpdates: true
          replacesArtifacts: true
          body: ''
